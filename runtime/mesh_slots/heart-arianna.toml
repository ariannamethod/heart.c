[slot]
id = "heart/arianna"
description = "phone-1 heart.c — Arianna voice turn (Resonance 200M + dual attention)"
exec = "heart converse --voice arianna --max_tokens 64"
async = false
args_schema = "[{name:'prompt',type:'string',optional:true}]"
output = "stdout text (turn transcript)"

[requires]
ram = "500MB"
disk = "0"
gpu = false

[provides]
streaming_metrics = ""

[ownership]
arch = ["aarch64"]
os   = ["android"]
