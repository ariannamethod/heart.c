[slot]
id = "heart/leo"
description = "phone-1 heart.c — Leo voice turn (Janus 170M + neoleo persona graft)"
exec = "heart converse --voice leo --max_tokens 64"
async = false
args_schema = "[{name:'prompt',type:'string',optional:true}]"
output = "stdout text (turn transcript)"

[requires]
ram = "500MB"
disk = "0"
gpu = false

[provides]
streaming_metrics = ""

[ownership]
arch = ["aarch64"]
os   = ["android"]
